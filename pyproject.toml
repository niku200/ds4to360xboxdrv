[project]
name = "ds4to360xboxdrv"
version = "5.1.0"
description = "DualShock 4/3 and DualSense to Xbox 360 Controller Mapper for Linux"
authors = [
    { name = "Jules", email = "jules@example.com" }
]
dependencies = [
    "PyGObject>=3.42.0",
    "evdev>=1.6.0",
]
readme = "README.md"
requires-python = ">= 3.10"

[project.scripts]
ds4to360-gui = "ds4to360.gui:main"
ds4to360-backend = "ds4to360.backend:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ds4to360"]

[tool.rye]
managed = true
dev-dependencies = [
    "installer>=1.0.1",
]
